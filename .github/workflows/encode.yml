name: Encode VLESS to Base64 with Embedded Profile

on:
  push:
    paths:
      - 'links.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare and Encode Subscription
        run: |
          # 1. Очищаем файл со ссылками от мусора Windows
          sed -i 's/\r//g' links.txt
          sed -i '/^$/d' links.txt
          
          # 2. Создаем временный файл с метаданными прямо в тексте (формат для v2rayNG)
          echo "#profile-title: 💖MASTERVP-VPN💖" > temp_sub.txt
          echo "#profile-update-interval: 1" >> temp_sub.txt
          echo "#subscription-userinfo: upload=0; download=0; total=10737418240; expire=1781481600" >> temp_sub.txt
          echo "" >> temp_sub.txt # пустая строка-разделитель
          
          # 3. Добавляем туда твои сервера из links.txt
          cat links.txt >> temp_sub.txt
          
          # 4. Кодируем всё это добро вместе в один Base64 файл sub.txt
          base64 -w 0 temp_sub.txt > sub.txt
          
          # На всякий случай дублируем старый headers для совместимости
          echo "/sub.txt" > _headers
          echo "  profile-title: 💖MASTERVP-VPN💖" >> _headers
          echo "  profile-update-interval: 1" >> _headers
          echo "  subscription-userinfo: upload=0; download=0; total=10737418240; expire=1781481600" >> _headers

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sub.txt _headers
          git diff-index --quiet HEAD || git commit -m "Зашивка профиля прямо в Base64"
          git push
          
