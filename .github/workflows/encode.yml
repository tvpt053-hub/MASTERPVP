name: Encode VLESS to Base64 with Headers

on:
  push:
    paths:
      - 'links.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Encode links to Base64
        run: |
          base64 -w 0 links.txt > sub.txt

      - name: Create Headers for GitHub Pages
        run: |
          # Создаем файл настроек заголовков для серверов GitHub
          echo "/sub.txt" > _headers
          echo "  profile-title: 💖MASTERVP-VPN💖" >> _headers
          echo "  profile-update-interval: 1" >> _headers
          echo "  subscription-userinfo: upload=0; download=0; total=10737418240; expire=1781481600" >> _headers

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sub.txt _headers
          git diff-index --quiet HEAD || git commit -m "Обновление подписки и заголовков"
          git push
          
